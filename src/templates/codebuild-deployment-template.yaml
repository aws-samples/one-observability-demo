              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudformation:DeleteStack
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/application": !Ref pApplicationName
              - Effect: Allow
                Action:
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStackResources
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/CDKToolkitPetsite/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicy
                Resource:
                  - !Sub 'arn:aws:s3:::cdk-petsite-assets-${AWS::AccountId}-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::cdk-petsite-assets-${AWS::AccountId}-${AWS::Region}/*'
              - Effect: Allow
                Action:
                  - ecr:DeleteRepository
                  - ecr:BatchDeleteImage
                  - ecr:ListImages
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/cdk-petsite-container-assets-${AWS::AccountId}-${AWS::Region}'
              - Effect: Allow
                Action:
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:GetRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/cdk-petsite-*'
              - Effect: Allow
                Action:
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cdk-bootstrap/petsite/*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt rCleanupCompletionFunction.Arn
                  - !GetAtt rBucketCleanupFunction.Arn
                  - !GetAtt rDeletionResultCheckerFunction.Arn
                  - !GetAtt rCrossRegionStackOperationFunction.Arn

  # Lambda function to check deletion results
  rDeletionResultCheckerFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Sub ${AWS::StackName}-deletion-result-checker
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt rDeletionResultCheckerRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          def handler(event, context):
              # Check if all deletions were successful
              all_successful = all(
                  result.get('status') == 'success'
                  for result in event
                  if isinstance(result, dict)
              )
              return {'allSuccessful': all_successful}

  # IAM Role for Deletion Result Checker Lambda
  rDeletionResultCheckerRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Lambda function to list CDK stacks by tag
  rCDKStackListerFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Sub ${AWS::StackName}-cdk-stack-lister
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt rCDKStackListerRole.Arn
      Timeout: 60
      Code:
        ZipFile: !Sub |
          import boto3

          def handler(event, context):
              current_region = '${AWS::Region}'
              cf_client = boto3.client('cloudformation', region_name=current_region)
              stacks = []

              try:
                  # List stacks in current region
                  paginator = cf_client.get_paginator('list_stacks')
                  for page in paginator.paginate(StackStatusFilter=['CREATE_COMPLETE', 'CREATE_IN_PROGRESS', 'UPDATE_COMPLETE', 'DELETE_FAILED', 'ROLLBACK_COMPLETE', 'ROLLBACK_FAILED']):
                      for stack in page['StackSummaries']:
                          # Skip nested stacks
                          if 'ParentId' in stack:
                              continue

                          try:
                              # Get stack tags
                              stack_detail = cf_client.describe_stacks(StackName=stack['StackName'])
                              tags = stack_detail['Stacks'][0].get('Tags', [])

                              # Check if stack has the required application tag
                              has_app_tag = False
                              sequence_value = 1  # Default sequence value

                              for tag in tags:
                                  if tag['Key'] == 'application' and tag['Value'] == '${pApplicationName}':
                                      has_app_tag = True
                                  elif tag['Key'] == 'sequence':
                                      try:
                                          sequence_value = int(tag['Value'])
                                      except ValueError:
                                          sequence_value = 1

                              if has_app_tag:
                                  stacks.append({
                                      'name': stack['StackName'],
                                      'region': current_region,
                                      'sequence': sequence_value
                                  })
                          except Exception as e:
                              print(f"Error checking stack {stack['StackName']}: {str(e)}")
                              continue

                  # Check for us-east-1 support stack if not already in us-east-1
                  if current_region != 'us-east-1':
                      try:
                          cf_useast1 = boto3.client('cloudformation', region_name='us-east-1')
                          support_stack_name = 'OneObservability-support-us-east-1'
                          stack_detail = cf_useast1.describe_stacks(StackName=support_stack_name)
                          # Support stacks are created by CDK cross-region references and may not have tags
                          # Include them based on name pattern
                          stacks.append({
                              'name': support_stack_name,
                              'region': 'us-east-1',
                              'sequence': 0  # Delete after main stacks
                          })
                      except Exception as e:
                          print(f"No support stack in us-east-1 or error checking: {str(e)}")

                  # Sort stacks by sequence in descending order (highest first)
                  stacks.sort(key=lambda x: x['sequence'], reverse=True)

                  # Return stacks with region information
                  return {'stacks': stacks}
              except Exception as e:
                  print(f"Error listing stacks: {str(e)}")
                  return {'stacks': []}

  # IAM Role for CDK Stack Lister Lambda
  rCDKStackListerRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CDKStackListerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:ListStacks
                  - cloudformation:DescribeStacks
                Resource: "*"

  # Lambda function for cross-region stack operations
  rCrossRegionStackOperationFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Sub ${AWS::StackName}-cross-region-stack-ops
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt rCrossRegionStackOperationRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          from datetime import datetime

          def handler(event, context):
              stack_name = event.get('name')
              region = event.get('region')
              operation = event.get('operation', 'describe')

              cf_client = boto3.client('cloudformation', region_name=region)

              try:
                  if operation == 'delete':
                      cf_client.delete_stack(StackName=stack_name)
                      return {'status': 'DELETE_IN_PROGRESS'}
                  elif operation == 'status':
                      response = cf_client.describe_stacks(StackName=stack_name)
                      return {'status': response['Stacks'][0]['StackStatus']}
                  else:
                      response = cf_client.describe_stacks(StackName=stack_name)
                      stack = response['Stacks'][0]
                      # Convert datetime objects to ISO format strings
                      if 'CreationTime' in stack:
                          stack['CreationTime'] = stack['CreationTime'].isoformat()
                      if 'LastUpdatedTime' in stack:
                          stack['LastUpdatedTime'] = stack['LastUpdatedTime'].isoformat()
                      if 'DeletionTime' in stack:
                          stack['DeletionTime'] = stack['DeletionTime'].isoformat()
                      return {'stack': stack}
              except cf_client.exceptions.ValidationError:
                  return {'status': 'DELETE_COMPLETE'}
              except Exception as e:
                  raise Exception(f"Error in {operation} operation for {stack_name} in {region}: {str(e)}")

  # IAM Role for Cross-Region Stack Operation Lambda
  rCrossRegionStackOperationRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CrossRegionStackOperationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DeleteStack
                Resource: "*"

  # Lambda function to clean up retained resources after Step Function completes
  rCleanupCompletionFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Sub ${AWS::StackName}-cleanup-completion
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt rCleanupCompletionRole.Arn
      Timeout: 300
      Code:
        ZipFile: !Sub |
          import boto3
          import time

          def handler(event, context):
              stack_name = event.get('StackName')
              if not stack_name:
                  print("No stack name provided")
                  return

              time.sleep(30)

              try:
                  lambda_client = boto3.client('lambda')
                  sf_client = boto3.client('stepfunctions')
                  events_client = boto3.client('events')
                  iam_client = boto3.client('iam')

                  # Delete Lambda functions
                  for func_name in [
                      f"{stack_name}-cdk-stack-lister",
                      f"{stack_name}-deletion-result-checker",
                      f"{stack_name}-bucket-cleanup",
                      f"{stack_name}-cleanup-monitor"
                  ]:
                      try:
                          lambda_client.delete_function(FunctionName=func_name)
                          print(f"Deleted Lambda: {func_name}")
                      except Exception as e:
                          print(f"Error deleting {func_name}: {str(e)}")

                  # Delete EventBridge rules
                  try:
                      rules = events_client.list_rules()['Rules']
                      for rule in rules:
                          if stack_name in rule.get('Description', '') or stack_name in rule['Name']:
                              try:
                                  targets = events_client.list_targets_by_rule(Rule=rule['Name'])
                                  if targets['Targets']:
                                      events_client.remove_targets(Rule=rule['Name'], Ids=[t['Id'] for t in targets['Targets']])
                                  events_client.delete_rule(Name=rule['Name'])
                                  print(f"Deleted EventBridge rule: {rule['Name']}")
                              except Exception as e:
                                  print(f"Error deleting rule {rule['Name']}: {str(e)}")
                  except Exception as e:
                      print(f"Error deleting EventBridge rules: {str(e)}")

                  # Delete IAM roles
                  for role_name in [
                      f"{stack_name}-cdk-cleanup-role",
                      f"{stack_name}-cdk-stack-lister-role",
                      f"{stack_name}-deletion-result-checker-role",
                      f"{stack_name}-bucket-cleanup-role",
                      f"{stack_name}-cleanup-completion-role",
                      f"{stack_name}-cleanup-monitor-role",
                      f"{stack_name}-eventbridge-role"
                  ]:
                      try:
                          iam_client.list_attached_role_policies(RoleName=role_name)
                          for policy in iam_client.list_attached_role_policies(RoleName=role_name)['AttachedPolicies']:
                              iam_client.detach_role_policy(RoleName=role_name, PolicyArn=policy['PolicyArn'])
                          for policy in iam_client.list_role_policies(RoleName=role_name)['PolicyNames']:
                              iam_client.delete_role_policy(RoleName=role_name, PolicyName=policy)
                          iam_client.delete_role(RoleName=role_name)
                          print(f"Deleted IAM role: {role_name}")
                      except Exception as e:
                          print(f"Error deleting role {role_name}: {str(e)}")

                  # Delete Step Function
                  try:
                      sf_arn = f"arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:{stack_name}-cdk-cleanup"
                      sf_client.delete_state_machine(stateMachineArn=sf_arn)
                      print(f"Deleted Step Function: {sf_arn}")
                  except Exception as e:
                      print(f"Error deleting Step Function: {str(e)}")

                  # Delete this function itself
                  try:
                      lambda_client.delete_function(FunctionName=f"{stack_name}-cleanup-completion")
                      print("Deleted cleanup completion function")
                  except Exception as e:
                      print(f"Error deleting cleanup completion function: {str(e)}")

              except Exception as e:
                  print(f"Error in cleanup completion: {str(e)}")

  # IAM Role for Cleanup Completion Lambda
  rCleanupCompletionRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CleanupCompletionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Step Function deletion - specific to this stack's state machine
              - Effect: Allow
                Action:
                  - states:DeleteStateMachine
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${AWS::StackName}-cdk-cleanup"
              # Lambda function deletion - specific to this stack's functions
              - Effect: Allow
                Action:
                  - lambda:DeleteFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*"
              # EventBridge rules - list and manage rules for this stack
              - Effect: Allow
                Action:
                  - events:ListRules
                Resource: "*"
              - Effect: Allow
                Action:
                  - events:ListTargetsByRule
                  - events:RemoveTargets
                  - events:DeleteRule
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*"
                Condition:
                  StringLike:
                    "events:source": "aws.cloudformation"
              # IAM role management - only for roles created by this stack
              - Effect: Allow
                Action:
                  - iam:DeleteRole
                  - iam:DetachRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${AWS::StackName}-*"

  # Lambda function to clean up S3 buckets
  rBucketCleanupFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Sub ${AWS::StackName}-bucket-cleanup
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt rBucketCleanupRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import boto3

          def handler(event, context):
              s3_client = boto3.client('s3')
              bucket_name = event.get('bucketName')
              delete_bucket = event.get('deleteBucket', False)

              if not bucket_name:
                  return {'statusCode': 400, 'body': 'Bucket name required'}

              try:
                  try:
                      s3_client.head_bucket(Bucket=bucket_name)
                      print(f"Found bucket: {bucket_name}")
                  except s3_client.exceptions.NoSuchBucket:
                      print(f"Bucket {bucket_name} does not exist")
                      return {'statusCode': 200, 'body': 'Bucket does not exist'}

                  paginator = s3_client.get_paginator('list_object_versions')
                  delete_keys = []

                  for page in paginator.paginate(Bucket=bucket_name):
                      if 'Versions' in page:
                          delete_keys.extend([{'Key': obj['Key'], 'VersionId': obj['VersionId']} for obj in page['Versions']])
                      if 'DeleteMarkers' in page:
                          delete_keys.extend([{'Key': obj['Key'], 'VersionId': obj['VersionId']} for obj in page['DeleteMarkers']])

                  if delete_keys:
                      for i in range(0, len(delete_keys), 1000):
                          s3_client.delete_objects(
                              Bucket=bucket_name,
                              Delete={'Objects': delete_keys[i:i+1000]}
                          )
                      print(f"Deleted {len(delete_keys)} objects from {bucket_name}")

                  if delete_bucket:
                      s3_client.delete_bucket(Bucket=bucket_name)
                      print(f"Deleted bucket: {bucket_name}")

                  return {'statusCode': 200, 'body': f'Successfully cleaned up {bucket_name}'}
              except Exception as e:
                  print(f"Error cleaning up bucket: {str(e)}")
                  return {'statusCode': 500, 'body': f'Error: {str(e)}'}

  # IAM Role for Bucket Cleanup Lambda
  rBucketCleanupRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BucketCleanupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:DeleteBucket
                Resource:
                  - !Sub 'arn:aws:s3:::cdk-petsite-assets-${AWS::AccountId}-${AWS::Region}'
                  - !Sub 'arn:aws:s3:::cdk-petsite-assets-${AWS::AccountId}-${AWS::Region}/*'


  # Custom resource to monitor Step Function execution during stack deletion
  rCleanupMonitor:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - rCDKStackListerFunction
      - rDeletionResultCheckerFunction
      - rCrossRegionStackOperationFunction
      - rBucketCleanupFunction
      - rCleanupCompletionFunction
    Properties:
      ServiceToken: !GetAtt rCleanupMonitorFunction.Arn
      StateMachineArn: !GetAtt rCDKCleanupStateMachine.Arn

  # Lambda function to monitor cleanup execution
  rCleanupMonitorFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Sub ${AWS::StackName}-cleanup-monitor
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt rCleanupMonitorRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import time

          def handler(event, context):
              if event['RequestType'] in ['Create', 'Update']:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              # Delete operation - monitor Step Function
              sf_client = boto3.client('stepfunctions')
              state_machine_arn = event['ResourceProperties']['StateMachineArn']

              try:
                  # Start the Step Function
                  response = sf_client.start_execution(
                      stateMachineArn=state_machine_arn,
                      input='{}'
                  )
                  execution_arn = response['executionArn']
                  print(f"Started Step Function execution: {execution_arn}")

                  # Poll for completion
                  max_wait = 840  # 14 minutes
                  start_time = time.time()

                  while time.time() - start_time < max_wait:
                      exec_response = sf_client.describe_execution(executionArn=execution_arn)
                      status = exec_response['status']

                      if status == 'SUCCEEDED':
                          print("Step Function completed successfully")
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                          return
                      elif status in ['FAILED', 'TIMED_OUT', 'ABORTED']:
                          error_msg = f"Step Function failed with status: {status}"
                          print(error_msg)
                          cfnresponse.send(event, context, cfnresponse.FAILED, {}, error_msg)
                          return

                      time.sleep(10)

                  # Timeout
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, "Step Function execution timeout")
              except Exception as e:
                  print(f"Error monitoring Step Function: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, str(e))

  # IAM Role for Cleanup Monitor Lambda
  rCleanupMonitorRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StepFunctionMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !GetAtt rCDKCleanupStateMachine.Arn
              - Effect: Allow
                Action:
                  - states:DescribeExecution
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:${AWS::StackName}-cdk-cleanup:*"

  # EventBridge Rule for Stack Deletion
  rStackDeletionRule:
    Type: AWS::Events::Rule
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Trigger cleanup when stack is being deleted
      EventPattern:
        source: ["aws.cloudformation"]
        detail-type: ["CloudFormation Stack Status Change"]
        detail:
          stack-id: [!Ref "AWS::StackId"]
          status-details:
            status: ["DELETE_IN_PROGRESS"]
      State: ENABLED
      Targets:
        - Arn: !GetAtt rCDKCleanupStateMachine.Arn
          Id: "CDKCleanupTarget"
          RoleArn: !GetAtt rEventBridgeRole.Arn


  # IAM Role for EventBridge to invoke Step Function
  rEventBridgeRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !GetAtt rCDKCleanupStateMachine.Arn


