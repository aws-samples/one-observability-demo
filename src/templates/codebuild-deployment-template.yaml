  # Step Function for CDK Stack Cleanup
  rCDKCleanupStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub ${AWS::StackName}-cdk-cleanup
      RoleArn: !GetAtt rCDKCleanupRole.Arn
      DefinitionString: !Sub |
        {
          "Comment": "CDK Stack Cleanup State Machine",
          "StartAt": "ListTaggedStacks",
          "States": {
            "ListTaggedStacks": {
              "Type": "Task",
              "Resource": "arn:aws:states:::lambda:invoke",
              "Parameters": {
                "FunctionName": "${rCDKStackListerFunction}",
                "Payload": {}
              },
              "ResultPath": "$.stackList",
              "Next": "CheckStacksFound"
            },
            "CheckStacksFound": {
              "Type": "Choice",
              "Choices": [
                {
                  "Variable": "$.stackList.Payload.stacks",
                  "IsPresent": true,
                  "Next": "DeleteStacks"
                }
              ],
              "Default": "CleanupCDKStagingBucket"
            },
            "DeleteStacks": {
              "Type": "Map",
              "ItemsPath": "$.stackList.Payload.stacks",
              "MaxConcurrency": 1,
              "ResultPath": "$.deletionResults",
              "Iterator": {
                "StartAt": "DescribeStack",
                "States": {
                  "DescribeStack": {
                    "Type": "Task",
                    "Resource": "arn:aws:states:::lambda:invoke",
                    "Parameters": {
                      "FunctionName": "${rCrossRegionStackOperationFunction}",
                      "Payload.$": "$"
                    },
                    "ResultPath": "$.stackInfo",
                    "Next": "DeleteStack",
                    "Catch": [
                      {
                        "ErrorEquals": ["States.TaskFailed"],
                        "ResultPath": "$.error",
                        "Next": "CheckDescribeError"
                      }
                    ]
                  },
                  "CheckDescribeError": {
                    "Type": "Choice",
                    "Choices": [
                      {
                        "Variable": "$.error.Cause",
                        "StringMatches": "*ValidationError*",
                        "Next": "StackAlreadyDeleted"
                      }
                    ],
                    "Default": "DeletionFailed"
                  },
                  "DeleteStack": {
                    "Type": "Task",
                    "Resource": "arn:aws:states:::lambda:invoke",
                    "Parameters": {
                      "FunctionName": "${rCrossRegionStackOperationFunction}",
                      "Payload": {
                        "operation": "delete",
                        "name.$": "$.name",
                        "region.$": "$.region"
                      }
                    },
                    "ResultPath": "$.deleteResult",
                    "Next": "WaitForDeletion",
                    "Catch": [
                      {
                        "ErrorEquals": ["States.ALL"],
                        "ResultPath": "$.error",
                        "Next": "DeletionFailed"
                      }
                    ]
                  },
                  "WaitForDeletion": {
                    "Type": "Wait",
                    "Seconds": 30,
                    "Next": "CheckDeletionStatus"
                  },
                  "CheckDeletionStatus": {
                    "Type": "Task",
                    "Resource": "arn:aws:states:::lambda:invoke",
                    "Parameters": {
                      "FunctionName": "${rCrossRegionStackOperationFunction}",
                      "Payload": {
                        "operation": "status",
                        "name.$": "$.name",
                        "region.$": "$.region"
                      }
                    },
                    "ResultPath": "$.stackStatus",
                    "Next": "EvaluateDeletionStatus",
                    "Catch": [
                      {
                        "ErrorEquals": ["States.ALL"],
                        "ResultPath": "$.error",
                        "Next": "DeletionComplete"
                      }
                    ]
                  },
                  "EvaluateDeletionStatus": {
                    "Type": "Choice",
                    "Choices": [
                      {
                        "Variable": "$.stackStatus.Payload.status",
                        "StringEquals": "DELETE_IN_PROGRESS",
                        "Next": "WaitForDeletion"
                      },
                      {
                        "Variable": "$.stackStatus.Payload.status",
                        "StringEquals": "DELETE_COMPLETE",
                        "Next": "DeletionComplete"
                      }
                    ],
                    "Default": "DeletionFailed"
                  },
                  "DeletionComplete": {
                    "Type": "Pass",
                    "Result": {"status": "success"},
                    "End": true
                  },
                  "DeletionFailed": {
                    "Type": "Pass",
                    "Result": {"status": "failed"},
                    "End": true
                  },
                  "StackAlreadyDeleted": {
                    "Type": "Pass",
                    "Result": {"status": "success"},
                    "End": true
                  }
                }
              },
              "Next": "CheckDeletionResults"
            },
            "CheckDeletionResults": {
              "Type": "Task",
              "Resource": "arn:aws:states:::lambda:invoke",
              "Parameters": {
                "FunctionName": "${rDeletionResultCheckerFunction}",
                "Payload.$": "$.deletionResults"
              },
              "ResultPath": "$.allSuccessful",
              "Next": "EvaluateOverallSuccess"
            },
            "EvaluateOverallSuccess": {
              "Type": "Choice",
              "Choices": [
                {
                  "Variable": "$.allSuccessful.Payload.allSuccessful",
                  "BooleanEquals": true,
                  "Next": "CleanupCDKStagingBucket"
                }
              ],
              "Default": "SkipCleanup"
            },
            "SkipCleanup": {
              "Type": "Pass",
              "Result": "Stack deletion failed. Skipping Step Function and CDK bootstrap cleanup to allow retry.",
              "End": true
            },
            "CleanupCDKStagingBucket": {
              "Type": "Task",
              "Resource": "arn:aws:states:::lambda:invoke",
              "Parameters": {
                "FunctionName": "${rBucketCleanupFunction}",
                "Payload": {
                  "bucketName": "cdk-petsite-assets-${AWS::AccountId}-${AWS::Region}",
                  "deleteBucket": true
                }
              },
              "Next": "DeleteCDKToolkitStack"
            },
            "DeleteCDKToolkitStack": {
              "Type": "Task",
              "Resource": "arn:aws:states:::aws-sdk:cloudformation:deleteStack",
              "Parameters": {
                "StackName": "CDKToolkitPetsite"
              },
              "Next": "WaitForCDKToolkitDeletion",
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "Next": "CleanupComplete"
                }
              ]
            },
            "WaitForCDKToolkitDeletion": {
              "Type": "Wait",
              "Seconds": 30,
              "Next": "CheckCDKToolkitDeletionStatus"
            },
            "CheckCDKToolkitDeletionStatus": {
              "Type": "Task",
              "Resource": "arn:aws:states:::aws-sdk:cloudformation:describeStacks",
              "Parameters": {
                "StackName": "CDKToolkitPetsite"
              },
              "ResultPath": "$.cdkStackStatus",
              "Next": "EvaluateCDKToolkitDeletionStatus",
              "Catch": [
                {
                  "ErrorEquals": ["CloudFormation.ValidationError", "CloudFormation.CloudFormationException"],
                  "Next": "CleanupComplete"
                }
              ]
            },
            "EvaluateCDKToolkitDeletionStatus": {
              "Type": "Choice",
              "Choices": [
                {
                  "Variable": "$.cdkStackStatus.Stacks[0].StackStatus",
                  "StringEquals": "DELETE_IN_PROGRESS",
                  "Next": "WaitForCDKToolkitDeletion"
                },
                {
                  "Variable": "$.cdkStackStatus.Stacks[0].StackStatus",
                  "StringEquals": "DELETE_COMPLETE",
                  "Next": "CleanupComplete"
                }
              ],
              "Default": "CleanupComplete"
            },
            "CleanupComplete": {
              "Type": "Task",
              "Resource": "arn:aws:states:::lambda:invoke",
              "Parameters": {
                "FunctionName": "${rCleanupCompletionFunction}",
                "Payload": {
                  "StackName": "${AWS::StackName}"
                }
              },
              "End": true
            }
          }
        }

  # IAM Role for Step Function
  rCDKCleanupRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CDKCleanupPolicy
          PolicyDocument:
