name: Documentation

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

on:
  push:
    branches: [main, staging]
    paths:
      - 'docs-site/**'
      - 'src/cdk/**'
      - 'typedoc.json'
      - 'generated-diagrams/**'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, staging]
    paths:
      - 'docs-site/**'
      - 'src/cdk/**'
      - 'typedoc.json'
      - 'generated-diagrams/**'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install CDK dependencies
        run: npm ci
        working-directory: src/cdk

      - name: Generate API reference (TypeDoc)
        run: npx typedoc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: pip install -r docs-site/requirements.txt

      - name: Copy latest diagrams
        run: cp generated-diagrams/*.png docs-site/docs/assets/diagrams/ 2>/dev/null || true

      - name: Build documentation
        run: mkdocs build
        working-directory: docs-site

      # --- Production deploy (main → root of gh-pages, preserving pr-* preview dirs) ---
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site/site
          keep_files: true

      # --- PR preview (PR → /pr-{number}/ subdirectory on gh-pages) ---
      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site/site
          destination_dir: pr-${{ github.event.pull_request.number }}

      - name: Post preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const previewUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}/`;

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Documentation preview')
            );

            const body = `📖 **Documentation preview deployed.**\n\n🔗 **Preview URL:** ${previewUrl}\n\n_Updated at ${new Date().toISOString()} from commit ${context.sha.substring(0, 7)}_`;

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

  # --- Cleanup preview on PR close ---
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "docs: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          fi
