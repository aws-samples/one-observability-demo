name: Documentation

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main, staging]
    paths:
      - 'src/cdk/**'
      - 'typedoc.json'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'docs/**'
  pull_request:
    branches: [main, staging]
    paths:
      - 'src/cdk/**'
      - 'typedoc.json'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install CDK dependencies
        run: npm ci
        working-directory: src/cdk

      - name: Create ASH scan link
        run: |
          echo "# Security Scan Results" > ASH_SCAN.md
          echo "" >> ASH_SCAN.md
          echo "[Latest ASH Security Scan Results](https://github.com/${{ github.repository }}/actions/workflows/run-ash-security-scan.yaml)" >> ASH_SCAN.md
          sed -i 's|"docs/codebuild-cdk-deployment-template.md"]|"docs/codebuild-cdk-deployment-template.md", "ASH_SCAN.md"]|g' typedoc.json

      - name: Generate documentation
        run: npx typedoc

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki-docs

      - name: Upload preview artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-${{ github.sha }}
          path: wiki-docs
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  preview-comment:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post preview link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📖 **Documentation preview built successfully.**\n\nDownload the preview artifact from [this workflow run](${runUrl}) (artifact: \`docs-preview-${context.sha}\`, expires in 7 days).`
            });
