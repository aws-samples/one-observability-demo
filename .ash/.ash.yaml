# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/beta/automated_security_helper/schemas/AshConfig.json
project_name: one-observability-demo
fail_on_findings: true
global_settings:
    severity_threshold: MEDIUM
    ignore_paths:
        - path: '**/cdk.out/**'
          reason: 'CDK synthesized CloudFormation templates - build artifacts that should not be scanned'
        - path: cdk.out
          reason: 'CDK synthesized output directory'
        - path: src/cdk/node_modules
          reason: 'Skip node_modules folder'
        - path: docs-site/site
          reason: 'MkDocs build output directory'
        - path: docs-site/docs/api
          reason: 'TypeDoc generated API docs - built in CI pipeline'
        - path: archive/
          reason: 'Legacy application being migrated, for now only scan the new code'
        - path: grafana-dashboards
          reason: 'Skip legacy code during migration'
        - path: codepipeline-stack.yaml
          reason: 'Skip old pipeline since it will be migrated'
        - path: src/applications/lambda/pethistory-node/template.yaml
          reason: 'Temporary SAM template, will be moved to CDK'
        - path: .secrets.baseline
          reason: 'Secret Baseline file includes the word secret'


    suppressions:
        - rule_id: SECRET-SECRET-KEYWORD
          path: '.github/workflows/cdk-test.yml'
          reason: 'Dummy secret'
        - rule_id: SECRET-SECRET-KEYWORD
          path: '.secrets.baseline'
          reason: 'Secret Baseline file includes the word secret'
        - rule_id: SECRET-SECRET-KEYWORD
          path: 'src/applications/microservices/petlistadoptions-py/dbload-simulation-scripts/*.sh'
          reason: 'Scripts retrieve secrets from AWS Secrets Manager via environment variables, not hardcoded secrets'
        - rule_id: SECRET-PASSWORD-KEYWORD
          path: 'src/applications/microservices/petlistadoptions-py/dbload-simulation-scripts/*.sh'
          reason: 'PGPASSWORD is a PostgreSQL environment variable populated from AWS Secrets Manager, not a hardcoded password'
        - rule_id: SECRET-SECRET-KEYWORD
          path: '.github/workflows/tests.yml'
          line_start: 53
          reason: 'GitHub Actions workflow uses secrets context to access GitHub secrets, not hardcoded secrets'
        - rule_id: SECRET-SECRET-KEYWORD
          path: 'src/applications/microservices/payforadoption-go/payforadoption/database.go'
          line_start: 47
          reason: 'Variable name for secret retrieved from AWS Secrets Manager, not a hardcoded secret'
        - rule_id: SECRET-SECRET-KEYWORD
          path: 'src/applications/microservices/payforadoption-go/refresh_manager.go'
          line_start: 79
          reason: 'Variable name for secret retrieved from AWS Secrets Manager, not a hardcoded secret'
        - rule_id: SECRET-HEX-HIGH-ENTROPY-STRING
          path: 'src/applications/microservices/petfood-rs/API_DOCUMENTATION.md'
          reason: 'API documentation with example UUIDs and request IDs, not real secrets'
        - rule_id: SECRET-HEX-HIGH-ENTROPY-STRING
          path: 'src/applications/microservices/petfood-rs/postman_collection.json'
          reason: 'Postman collection with example UUIDs for API testing, not real secrets'
        - rule_id: SECRET-HEX-HIGH-ENTROPY-STRING
          path: 'src/applications/microservices/petfood-rs/tests/common/mod.rs'
          line_start: 217
          reason: 'Test file with mock data UUIDs, not real secrets'
        - rule_id: SECRET-BASE64-HIGH-ENTROPY-STRING
          path: 'src/applications/microservices/petsite-net/petsite/wwwroot/lib/jquery-validation/dist/additional-methods.js'
          reason: 'Third-party jQuery validation library, not application secrets'
        - rule_id: SECRET-BASE64-HIGH-ENTROPY-STRING
          path: 'src/applications/microservices/petsite-net/petsite/wwwroot/lib/jquery-validation/dist/additional-methods.min.js'
          reason: 'Third-party jQuery validation library (minified), not application secrets'
        # Semgrep findings - acceptable for development/testing or false positives
        - rule_id: go.lang.security.audit.net.use-tls.use-tls
          path: 'src/applications/microservices/payforadoption-go/main.go'
          reason: 'HTTP server runs behind load balancer with TLS termination in production'
        - rule_id: go.lang.security.audit.database.string-formatted-query.string-formatted-query
          path: 'src/applications/microservices/payforadoption-go/payforadoption/repository.go'
          reason: 'Uses parameterized queries with placeholders, not string interpolation - false positive'
        - rule_id: yaml.docker-compose.security.writable-filesystem-service.writable-filesystem-service
          path: 'src/applications/microservices/petlistadoptions-py/docker-compose.yml'
          reason: 'Local development docker-compose - postgres and mock services require writable filesystem'
        - rule_id: yaml.docker-compose.security.writable-filesystem-service.writable-filesystem-service
          path: 'src/applications/microservices/petsearch-java/docker-compose.yml'
          reason: 'Local development docker-compose - localstack, setup, and collector services require writable filesystem'
        - rule_id: yaml.docker-compose.security.exposing-docker-socket-volume.exposing-docker-socket-volume
          path: 'src/applications/microservices/petsearch-java/docker-compose.yml'
          reason: 'LocalStack requires Docker socket for AWS service emulation in local development only'
        - rule_id: javascript.lang.security.audit.detect-non-literal-regexp.detect-non-literal-regexp
          path: 'src/applications/microservices/petsite-net/petsite/wwwroot/lib/jquery-validation-unobtrusive/jquery.validate.unobtrusive.js'
          reason: 'Third-party jQuery validation library, not application code'
        - rule_id: yaml.kubernetes.security.run-as-non-root.run-as-non-root
          path: 'src/cdk/lib/microservices/manifests/petsite-deployment.yaml'
          reason: 'Kubernetes manifest template - security context should be added during production deployment'
        - rule_id: yaml.kubernetes.security.allow-privilege-escalation-no-securitycontext.allow-privilege-escalation-no-securitycontext
          path: 'src/cdk/lib/microservices/manifests/petsite-deployment.yaml'
          reason: 'Kubernetes manifest template - security context should be added during production deployment'
        - rule_id: javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring
          path: 'src/cdk/scripts/cleanup-resources.ts'
          reason: 'CDK utility script for development/testing, not production code'
        - rule_id: python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2
          path: 'src/cdk/scripts/manage-exports.py'
          reason: 'CDK utility script for CloudFormation export management, not a web application'
        - rule_id: html.security.audit.missing-integrity.missing-integrity
          path: 'src/cdk/scripts/test-dashboard.html'
          reason: 'Test/development dashboard, not production code'
        - rule_id: bash.lang.security.ifs-tampering.ifs-tampering
          path: 'src/cdk/scripts/validate-account.sh'
          reason: 'CDK utility script for account validation, controlled environment'
        - rule_id: 'SECRET-BASE64-HIGH-ENTROPY-STRING'
          path: 'src/applications/microservices/petsite-net/petsite/Views/Adoption/Index.cshtml'
          line_start: 7
          line_end: 8
          reason: 'Subresource Integrity (SRI) hashes for CDN resources, not secrets'
        - rule_id: 'SECRET-HEX-HIGH-ENTROPY-STRING'
          path: 'src/applications/microservices/petsite-net/petsite/Views/Adoption/Index.cshtml'
          line_start: 7
          line_end: 8
          reason: 'Subresource Integrity (SRI) hashes for CDN resources, not secrets'
        # CDK-Nag suppressions moved from inline in codebuild-deployment-template.yaml
        - rule_id: AwsSolutions-S1
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rConfigBucket'
          reason: 'Bucket used to trigger CodePipeline, access logs are not needed'
        - rule_id: AwsSolutions-IAM4
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rResourceCleanupRole'
          reason: 'AWS managed policies are acceptable for a Lambda function'
        - rule_id: AwsSolutions-IAM5
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rResourceCleanupRole'
          reason: 'Wildcard is needed since stack name is automatically generated'
        - rule_id: AwsSolutions-IAM4
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCodeBuildServiceRole'
          reason: 'AWS managed policies are acceptable for a CodeBuild project'
        - rule_id: AwsSolutions-IAM5
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCodeBuildServiceRole'
          reason: 'Wildcard is needed since we have no control on the pipeline name'
        - rule_id: AwsSolutions-CB4
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKDeploymentProject'
          reason: 'CodeBuild Project is used to kickoff the initial CDK deployment. AWS KMS is not required'
        - rule_id: AwsSolutions-IAM4
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rStartDeploymentFunctionRole'
          reason: 'Use of AWSLambdaBasicExecutionRole is acceptable here'
        - rule_id: AwsSolutions-IAM4
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKStackListerRole'
          reason: 'AWS managed policies are acceptable for Lambda function'
        - rule_id: AwsSolutions-IAM5
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKStackListerRole'
          reason: 'Wildcard is acceptable for describe stack action'
        - rule_id: AwsSolutions-IAM5
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKCleanupRole'
          reason: 'Wildcard is acceptable for describe stack action'
        - rule_id: AwsSolutions-SF1
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKCleanupStateMachine'
          reason: 'The purpose of the step function is to clean up all resources, additional logs not needed'
        - rule_id: AwsSolutions-SF2
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKCleanupStateMachine'
          reason: 'X-Ray is not needed for this function since only CFN endpoint is used'
        # Checkov suppressions moved from inline comments in codebuild-deployment-template.yaml
        - rule_id: CKV_AWS_117
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rResourceCleanupFunction'
          reason: 'Custom Resource Lambda only interacts with AWS endpoints, VPC is not needed'
        - rule_id: CKV_AWS_116
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rResourceCleanupFunction'
          reason: 'DLQ will increase complexity, this is not needed just to signal CFN deployment since it will time-out'
        - rule_id: CKV_AWS_173
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rResourceCleanupFunction'
          reason: 'Custom Resource Lambda, encryption is not included for simplicity'
        - rule_id: CKV_AWS_115
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rResourceCleanupFunction'
          reason: 'Function is executed only once, no need for concurrency configurations'
        - rule_id: CKV_AWS_18
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rConfigBucket'
          reason: 'Bucket used to trigger CodePipeline, access logs are not needed'
        - rule_id: CKV_AWS_21
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rConfigBucket'
          reason: 'Bucket used to trigger CodePipeline, object versioning is not needed'
        - rule_id: CKV_AWS_117
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rStartDeploymentFunction'
          reason: 'Custom Resource Lambda only interacts with AWS endpoints, VPC is not needed'
        - rule_id: CKV_AWS_116
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rStartDeploymentFunction'
          reason: 'DLQ will increase complexity, this is not needed just to signal CFN deployment since it will time-out'
        - rule_id: CKV_AWS_173
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rStartDeploymentFunction'
          reason: 'Custom Resource Lambda, encryption is not included for simplicity'
        - rule_id: CKV_AWS_115
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rStartDeploymentFunction'
          reason: 'Function is executed only once, no need for concurrency configurations'
        - rule_id: CKV_AWS_117
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKStackListerFunction'
          reason: 'Custom Resource Lambda only interacts with AWS endpoints, VPC is not needed'
        - rule_id: CKV_AWS_116
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKStackListerFunction'
          reason: 'DLQ will increase complexity, this is not needed just to check CFN stack status'
        - rule_id: CKV_AWS_115
          path: 'src/templates/codebuild-deployment-template.yaml'
          resource_id: 'rCDKStackListerFunction'
          reason: 'Function is executed only once, no need for concurrency configurations'
        # CKV_AWS_111 - IAM policy wildcard for cross-region cleanup Lambda
        - rule_id: CKV_AWS_111
          path: 'src/templates/codebuild-deployment-template.yaml'
          line_start: 1458
          line_end: 1481
          resource_id: 'rCrossRegionStackOperationRole'
          reason: 'Wildcard resource needed for cleanup Lambda to delete dynamically-named CDK stacks across regions. Limited to DescribeStacks and DeleteStack actions only.'
        # Dockerfile suppressions for benchmark tool
        - rule_id: CKV_DOCKER_7
          path: 'src/applications/microservices/payforadoption-go/benchmark/Dockerfile'
          line_start: 3
          reason: 'Benchmark/testing tool - using latest Rust image is acceptable for non-production testing utilities'
        - rule_id: CKV_DOCKER_2
          path: 'src/applications/microservices/payforadoption-go/benchmark/Dockerfile'
          line_start: 1
          line_end: 10
          reason: 'Benchmark tool runs once and exits - HEALTHCHECK not applicable for short-lived testing utilities'
        # NPM dependency vulnerabilities - transitive dependencies from aws-cdk-lib
        - rule_id: GHSA-7r86-cg39-jmmj-minimatch
          path: 'src/cdk/package-lock.json'
          reason: 'Transitive dependency from aws-cdk-lib 2.240.0, waiting for CDK update with minimatch >= 10.2.3'
          expires: '2026-03-28'
        - rule_id: GHSA-23c5-xmqv-rm74-minimatch
          path: 'src/cdk/package-lock.json'
          reason: 'Transitive dependency from aws-cdk-lib 2.240.0, waiting for CDK update with minimatch >= 10.2.4'
          expires: '2026-03-28'
        - rule_id: GHSA-7r86-cg39-jmmj-minimatch
          path: 'package-lock.json'
          reason: 'Transitive dependency, waiting for upstream fix'
          expires: '2026-03-28'
        - rule_id: GHSA-23c5-xmqv-rm74-minimatch
          path: 'package-lock.json'
          reason: 'Transitive dependency, waiting for upstream fix'
          expires: '2026-03-28'
        - rule_id: GHSA-3ppc-4f35-3m26-minimatch
          path: 'package-lock.json'
          reason: 'Transitive dependency, waiting for upstream fix'
          expires: '2026-03-28'

ash_plugin_modules:
   - automated_security_helper.plugin_modules.ash_trivy_plugins
build: null
converters:
    archive:
        name: archive
        enabled: false
        options: {}
    jupyter:
        name: jupyter
        enabled: true
        options:
            tool_version: '>=7.16.0,<8.0.0'
            install_timeout: 300
scanners:
    bandit:
        name: bandit
        enabled: true
        options:
            severity_threshold: null
            config_file: null
            confidence_level: all
            ignore_nosec: false
            excluded_paths:
                - path: src/cdk/cdk.out
                  reason: 'CDK Assets are already scanned'
            additional_formats: []
            tool_version: '>=1.7.0,<2.0.0'
            install_timeout: 300
    cdk-nag:
        name: cdk-nag
        enabled: false
        options:
            severity_threshold: null
            nag_packs:
                AwsSolutionsChecks: true
                HIPAASecurityChecks: false
                NIST80053R4Checks: false
                NIST80053R5Checks: false
                PCIDSS321Checks: false
    cfn-nag:
        name: cfn-nag
        enabled: false
        options:
            severity_threshold: null
    checkov:
        name: checkov
        enabled: true
        options:
            severity_threshold: null
            config_file: null
            skip_path:
                - path: src/cdk/cdk.out
                  reason: 'CDK Assets are already scanned with CDK_NAG'
            additional_formats:
                - cyclonedx_json
            offline: false
            frameworks:
                - all
            skip_frameworks: []
            tool_version: null
            install_timeout: 300
    detect-secrets:
        name: detect-secrets
        enabled: true
        options:
            severity_threshold: null
            baseline_file: .secrets.baseline
            scan_settings:
                version: null
                generated_at: null
                plugins_used: []
                filters_used: []
                results: {}
    grype:
        name: grype
        enabled: true
        options:
            severity_threshold: null
            config_file: null
            offline: false
    npm-audit:
        name: npm-audit
        enabled: true
        options:
            severity_threshold: null
            offline: false
    opengrep:
        name: opengrep
        enabled: false
        options:
            severity_threshold: null
            config: auto
            exclude:
                - '*-converted.py'
                - '*_report_result.txt'
            exclude_rule: []
            severity: []
            metrics: auto
            offline: false
            patterns: []
            version: v1.1.5
    semgrep:
        name: semgrep
        enabled: true
        options:
            severity_threshold: null
            config: auto
            exclude:
                - '*-converted.py'
                - '*_report_result.txt'
            exclude_rule: []
            severity: []
            metrics: auto
            offline: false
            tool_version: null
            install_timeout: 300
    syft:
        name: syft
        enabled: true
        options:
            severity_threshold: null
            config_file: null
            exclude: []
            additional_outputs:
                - syft-table
    trivy-repo:
        enabled: false
        options:
            scanners: ['vuln', 'misconfig', 'secret', 'license']
            severity: 'MEDIUM'
            ignore_unfixed: false
            license_full: false
            disable_telemetry: true
reporters:
    csv:
        name: csv
        enabled: true
        options: {}
        extension: csv
    cyclonedx:
        name: cyclonedx
        enabled: true
        options: {}
        extension: cdx.json
    html:
        name: html
        enabled: true
        options: {}
        extension: html
    flat-json:
        name: flat-json
        enabled: true
        options:
            include_scanner_metrics: true
            include_summary_metrics: true
            include_metadata: true
        extension: flat.json
    gitlab-sast:
        name: gitlab-sast
        enabled: true
        options: {}
        extension: gl-sast-report.json
    junitxml:
        name: junitxml
        enabled: true
        options:
            respect_severity_threshold: true
        extension: junit.xml
    markdown:
        name: markdown
        enabled: true
        options:
            include_summary: true
            include_findings_table: false
            include_detailed_findings: true
            max_detailed_findings: 20
            top_hotspots_limit: 10
            use_collapsible_details: true
        extension: summary.md
    ocsf:
        name: ocsf
        enabled: true
        options: {}
        extension: ocsf.json
    sarif:
        name: sarif
        enabled: true
        options: {}
        extension: sarif
    spdx:
        name: spdx
        enabled: false
        options: {}
        extension: spdx.json
    text:
        name: text
        enabled: true
        options:
            include_summary: true
            include_findings_table: false
            include_detailed_findings: false
            max_detailed_findings: 20
            top_hotspots_limit: 20
        extension: summary.txt
    yaml:
        name: yaml
        enabled: false
        options: {}
        extension: yaml
mcp-resource-management:
    max_concurrent_scans: 3
    max_concurrent_tasks: 20
    thread_pool_max_workers: 4
    scan_timeout_seconds: 1800
    operation_timeout_seconds: 180
    shutdown_timeout_seconds: 30
    memory_warning_threshold_mb: 1024
    memory_critical_threshold_mb: 2048
    task_count_warning_threshold: 15
    max_message_size_bytes: 10485760
    max_path_length: 4096
    max_directory_size_mb: 1000
    enable_health_checks: true
    health_check_interval_seconds: 60
    enable_resource_logging: true
    log_resource_operations: false
